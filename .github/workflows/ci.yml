# Name of your workflow
name: Python CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push events for the "main" branch
  push:
    branches: ["main"]
  # Triggers the workflow on pull request events targeting the "main" branch
  pull_request:
    branches: ["main"]

# Default to read-only permissions; elevate only in the coverage job.
permissions:
  contents: read

# Cancel an in-progress run when a newer commit is pushed to the same ref
# (e.g. a PR branch), so superseded runs don't tie up CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Lint and type-check once, on one interpreter. Running these in every
  # matrix leg wasted time and — worse — checked with *different* tool
  # versions per interpreter (Python 3.8 resolves an old mypy).
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v9.0.0

      # Deliberately unpinned (uv.lock is not consulted): CI exercises fresh
      # dependency releases before users hit them. uv just installs faster.
      - name: Install dependencies
        run: uv pip install --system -e ".[dev,csv]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Type check with Mypy
        run: mypy src

      - name: Type check with Ty
        run: ty check src

      - name: Check Python 3.8 compatibility
        run: python scripts/check_py38_compat.py src/aiogzip/*.py

  build:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # Defines a build matrix for your tests. Linux runs the full Python
    # version sweep; Windows and macOS run a single version each to guard
    # platform-specific paths (e.g. os.linesep newline translation in text
    # mode, path handling) without multiplying CI cost across the matrix.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repository
        uses: actions/checkout@v7

      # Step 2: Sets up the specific version of Python from the matrix
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v9.0.0

      # Step 3: Install dependencies. The [test] extra skips lint-only
      # tooling (ruff, ty, prek); deliberately unpinned (uv.lock is
      # not consulted) so CI exercises fresh dependency releases.
      - name: Install dependencies
        run: uv pip install --system -e ".[test,csv]"

      # Step 4: Run tests with pytest and coverage
      # --cov-fail-under gates against silent coverage regressions. The
      # threshold sits a few points below the current ~91% to absorb
      # benign per-platform branch differences without nuisance failures.
      - name: Run tests with pytest and coverage
        run: |
          pytest --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      # The coverage-comment job reuses this leg's coverage data instead of
      # re-running the suite. relative_files = true in [tool.coverage.run]
      # keeps the paths portable across jobs.
      - name: Upload coverage data
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data
          path: .coverage
          include-hidden-files: true

  # The main matrix above installs only [test,csv], so it exercises the
  # pure-Python default (stdlib zlib, zlib-ng absent) — the common
  # `pip install aiogzip` install — across the full version/OS sweep. This
  # job adds the [fast] extra so the zlib-ng decompression and opt-in
  # compression paths are exercised on one representative version.
  fast-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v9.0.0

      - name: Install dependencies (with fast extra)
        run: uv pip install --system -e ".[test,csv,fast]"

      - name: Run tests with zlib-ng active
        run: |
          pytest --cov --cov-report=term-missing --cov-fail-under=85

      - name: Run tests with stdlib forced (zlib-ng installed but disabled)
        run: |
          AIOGZIP_ENGINE=stdlib pytest -q

  # Posts the coverage comment from the ubuntu/3.12 build leg's uploaded
  # .coverage data — no dependency install or duplicate test run needed.
  coverage-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-data

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
