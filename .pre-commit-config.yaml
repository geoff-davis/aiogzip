# Pre-commit hooks for aiogzip
# Install: pip install pre-commit && pre-commit install
# (installs both the pre-commit and pre-push hook types; see
# default_install_hook_types below)
# Run manually: pre-commit run --all-files

default_install_hook_types: [pre-commit, pre-push]

# Hooks without an explicit `stages` run in every installed stage; keep the
# lint/type/format hooks at commit time only so pushes stay fast — only the
# check-branch-fresh guard below runs at push.
default_stages: [pre-commit]

repos:
  # Refuse pushes from a branch based on a stale main (multi-machine
  # development guard; see CLAUDE.md "Sync Before Working").
  - repo: local
    hooks:
      - id: check-branch-fresh
        name: check-branch-fresh
        entry: scripts/check_branch_fresh.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

  # Ruff - Fast Python linter (replaces flake8, isort, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  # Mypy - Static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - types-aiofiles

  # Ty - Additional static type checking
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty check src
        language: python
        additional_dependencies: ["ty>=0.0.1a16", "aiofiles>=23.0.0", "types-aiofiles"]
        pass_filenames: false

  # Python 3.8 compatibility guard - mypy >=1.15 can't target 3.8, so we
  # grep for PEP 585 generics and PEP 604 union operators in src/.
  - repo: local
    hooks:
      - id: python38-compat
        name: python38-compat
        entry: scripts/check_py38_compat.py
        language: system
        files: ^src/.*\.py$
        pass_filenames: true

  # General code quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict
      # Check for merge conflicts
      - id: check-merge-conflict
      # Check YAML syntax
      - id: check-yaml
      # Check TOML syntax
      - id: check-toml
      # Ensure files end with newline
      - id: end-of-file-fixer
      # Trim trailing whitespace
      - id: trailing-whitespace
      # Check for accidentally committed large files
      - id: check-added-large-files
        args: [--maxkb=1000]
      # Prevent committing directly to main
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.19.0
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
        files: \.(md|markdown)$
