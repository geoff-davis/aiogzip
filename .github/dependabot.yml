# Dependabot keeps CI actions and Python dev dependencies current, so the
# action runtimes don't silently drift onto deprecated versions again.
version: 2
updates:
  # GitHub Actions used in the workflows under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "Update"
    groups:
      actions:
        patterns:
          - "*"

  # Python dependencies declared in pyproject.toml (dev/test/docs extras)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # This is a library: keep compatible lower bounds when they already admit
    # a newer release instead of silently dropping supported Python versions.
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "Update"
    # Ruff's project pin and pre-commit hook revision must move together, which
    # Dependabot cannot express as one update.
    ignore:
      - dependency-name: "ruff"
    groups:
      python-deps:
        patterns:
          - "*"

  # Refresh resolved development dependencies without rewriting the library's
  # compatibility constraints in pyproject.toml.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "lockfile-only"
    commit-message:
      prefix: "Update"
    groups:
      uv-lock:
        patterns:
          - "*"
