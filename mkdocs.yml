site_name: aiogzip
site_description: Async gzip I/O and a synchronous sans-I/O gzip codec for Python.
site_url: https://geoff-davis.github.io/aiogzip/

repo_name: geoff-davis/aiogzip
repo_url: https://github.com/geoff-davis/aiogzip

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra:
  version:
    provider: mike

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - Migrating from gzip: migration.md
  - Examples: examples.md
  - Recipes: recipes.md
  - Async-iterable streaming: streaming.md
  - Synchronous codec: codec.md
  - Performance: performance.md
  - Error handling: errors.md
  - API Reference: api.md
  - Design decisions (sans-I/O codec): adr-sans-io-codec.md
  - Design decisions (ISA-L): adr-isal.md
  - Contributing: contributing.md
