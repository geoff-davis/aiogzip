# Name of your workflow
name: Python CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push events for the "main" branch
  push:
    branches: ["main"]
  # Triggers the workflow on pull request events targeting the "main" branch
  pull_request:
    branches: ["main"]

# Default to read-only permissions; elevate only in the coverage job.
permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}
    # Defines a build matrix for your tests. Linux runs the full Python
    # version sweep; Windows and macOS run a single version each to guard
    # platform-specific paths (e.g. os.linesep newline translation in text
    # mode, path handling) without multiplying CI cost across the matrix.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Sets up the specific version of Python from the matrix
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,csv]

      # Step 4: Lint with Ruff
      - name: Lint with Ruff
        run: |
          ruff check .

      # Step 5: Check formatting with Ruff
      - name: Check formatting with Ruff
        run: |
          ruff format --check .

      # Step 6: Type check with Mypy
      - name: Type check with Mypy
        run: |
          mypy src

      # Step 7: Type check with Ty
      - name: Type check with Ty
        run: |
          ty check src

      # Step 8: Check Python 3.8 source syntax compatibility
      - name: Check Python 3.8 compatibility
        run: |
          python scripts/check_py38_compat.py src/aiogzip/*.py

      # Step 9: Run tests with pytest and coverage
      # --cov-fail-under gates against silent coverage regressions. The
      # threshold sits a couple points below the current ~87% to absorb
      # benign per-platform branch differences without nuisance failures.
      - name: Run tests with pytest and coverage
        run: |
          pytest --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=85

  # The main matrix above installs only [dev,csv], so it exercises the
  # pure-Python default (stdlib zlib, zlib-ng absent) — the common
  # `pip install aiogzip` install — across the full version/OS sweep. This
  # job adds the [fast] extra so the zlib-ng decompression and opt-in
  # compression paths are exercised on one representative version.
  fast-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with fast extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,csv,fast]

      - name: Run tests with zlib-ng active
        run: |
          pytest --cov --cov-report=term-missing --cov-fail-under=85

      - name: Run tests with stdlib forced (zlib-ng installed but disabled)
        run: |
          AIOGZIP_ENGINE=stdlib pytest -q

  coverage-comment:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,csv]

      - name: Run tests with coverage
        run: |
          pytest --cov --cov-report=xml

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
